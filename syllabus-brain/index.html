<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Syllabus Brain</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>🧠 Syllabus Brain</h1>
    <p>Intelligent Course Content Curator</p>
  </header>
  <main>
    <section id="input-section">
      <label for="syllabus">Enter Syllabus:</label>
      <textarea id="syllabus" placeholder="Week 1: Variables&#10;Week 2: Loops">Week 1: Variables
Week 2: Loops</textarea>
      <button id="generate">Generate Resources</button>
    </section>
    <section id="output-section" class="hidden">
      <h2>Curated Resources</h2>
      <div id="results"></div>
    </section>
  </main>
  <script src="js/app.js"></script>
</body>
</html>
